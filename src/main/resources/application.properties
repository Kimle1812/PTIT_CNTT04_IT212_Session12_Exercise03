spring.application.name=ABC Bank eKYC System

# ===== Datasource (H2 In-Memory for Development) =====
spring.datasource.url=jdbc:h2:mem:ekyc_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ===== H2 Console =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== Multipart File Upload =====
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===== Jackson =====
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# ===== Server =====
server.port=8080

# ===== eKYC Business Rules =====
ekyc.stp.match-threshold=0.85
ekyc.manual-review.min-match-threshold=0.70
ekyc.otp.expiry-seconds=120
ekyc.otp.max-attempts=3
ekyc.otp.lock-minutes=15
ekyc.face-scan.max-attempts=3
ekyc.face-scan.lock-hours=24
ekyc.min-age=18
ekyc.standard-limit=100000000
